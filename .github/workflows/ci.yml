name: CI

# Lichte syntaxcheck (geen build): valideert de gedeelde JS-modules en alle
# inline <script>-blokken, en controleert dat <script src="assets/..."> bestaat.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntaxcheck
        run: node scripts/check.mjs
