name: Deploy edge function

# Deployt de hive-tick edge function automatisch zodra de bron wijzigt op main.
# Vereist één repo-secret: SUPABASE_ACCESS_TOKEN
#   (Supabase dashboard → Account → Access Tokens → genereer een token,
#    daarna in GitHub: repo Settings → Secrets and variables → Actions).

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch: {}   # handmatig kunnen triggeren

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: oblzouaapvdippyhxmpo
    steps:
      - uses: actions/checkout@v4

      - name: Controleer of het secret aanwezig is
        id: guard
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN ontbreekt — deploy overgeslagen. Voeg het secret toe in de repo-instellingen."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Supabase CLI installeren
        if: steps.guard.outputs.skip != 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: hive-tick deployen
        if: steps.guard.outputs.skip != 'true'
        run: supabase functions deploy hive-tick --project-ref "$PROJECT_REF" --no-verify-jwt
